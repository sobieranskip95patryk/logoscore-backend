name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -f docker/Dockerfile -t logoscore-backend:${{ github.sha }} .
      # Add registry login + push step here when ready (GHCR / Docker Hub / GCR).
