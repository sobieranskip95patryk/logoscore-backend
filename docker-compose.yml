version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: logoscore-backend
    env_file: env/.env.development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: logoscore-postgres
    environment:
      POSTGRES_USER: logos
      POSTGRES_PASSWORD: logos
      POSTGRES_DB: logoscore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logos -d logoscore"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: logoscore-mongo
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: logos
      MONGO_INITDB_ROOT_PASSWORD: logos
      MONGO_INITDB_DATABASE: logoscore_intent
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express:1.0.2
    container_name: logoscore-mongo-ui
    profiles: ["tools"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: logos
      ME_CONFIG_MONGODB_ADMINPASSWORD: logos
      ME_CONFIG_MONGODB_URL: mongodb://logos:logos@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: logoscore-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
  mongodata:
